<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Spacing Gap Formatter (/4)</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
        }
        header h1 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 24px;
        }
        header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }
        .workspace {
            display: flex;
            gap: 20px;
        }
        .panel {
            flex: 1;
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        textarea {
            width: 100%;
            height: 480px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            resize: vertical;
            background-color: #f8fafc;
            color: #1e293b;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
        }
        .actions {
            text-align: center;
            margin: 20px 0;
        }
        .action-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .format-options {
            margin: 0 auto 20px;
            padding: 16px 18px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .format-options h2 {
            margin: 0 0 12px;
            font-size: 15px;
            color: #34495e;
        }
        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 10px 16px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #334155;
        }
        .option-item input {
            margin: 0;
        }
        button {
            padding: 12px 35px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }
        button:hover {
            background-color: #059669;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background-color: #0f766e;
            box-shadow: 0 4px 6px rgba(15, 118, 110, 0.2);
        }
        .btn-secondary:hover {
            background-color: #115e59;
        }
        #logPanel {
            margin-top: 15px;
            background: #ffffff;
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            display: none;
        }
        .log-success { color: #155724; background-color: #d4edda; border-left: 4px solid #28a745; padding: 8px 12px; border-radius: 4px; }
        .log-error { color: #721c24; background-color: #f8d7da; border-left: 4px solid #dc3545; padding: 8px 12px; border-radius: 4px; font-family: monospace; }
        .log-item { font-family: monospace; font-size: 12px; margin: 4px 0; color: #4b5563; }
        .log-warning { color: #7c2d12; background-color: #ffedd5; border-left: 4px solid #f97316; padding: 8px 12px; border-radius: 4px; }
        .btn-copy { padding: 4px 10px; font-size: 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-copy:hover { background: #2563eb; }
        .compare-panel {
            margin-top: 15px;
            background: #ffffff;
            border-radius: 8px;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>JSON Spacing Gap Formatter (/4)</h1>
        <p>Chọn các thuộc tính spacing hoặc card padding cần format, hệ thống sẽ tự tìm key tương ứng và chia giá trị cho 4.</p>
    </header>

    <div class="format-options">
        <h2>Chọn thuộc tính cần format (/4)</h2>
        <div class="option-grid">
            <label class="option-item">
                <input type="checkbox" class="format-option" value="spacing.section.paddingY.desktop" checked>
                <span>spacing.section.paddingY.desktop</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="spacing.section.paddingY.mobile" checked>
                <span>spacing.section.paddingY.mobile</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="spacing.slot.gap.desktop" checked>
                <span>spacing.slot.gap.desktop</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="spacing.slot.gap.mobile" checked>
                <span>spacing.slot.gap.mobile</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="cards.featured.padding" checked>
                <span>cards.featured.padding</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="cards.product.padding" checked>
                <span>cards.product.padding</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="cards.pricing.padding" checked>
                <span>cards.pricing.padding</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="cards.cta.padding" checked>
                <span>cards.cta.padding</span>
            </label>
            <label class="option-item">
                <input type="checkbox" class="format-option" value="cards.media.padding" checked>
                <span>cards.media.padding</span>
            </label>
        </div>
    </div>

    <div class="actions">
        <div class="action-group">
            <button onclick="transformJSON()">🚀 Thực Thi & Chia 4</button>
            <button class="btn-secondary" onclick="compareWithExactlyJSON()">🔍 So sánh với exactly.json</button>
        </div>
    </div>

    <div class="workspace">
        <div class="panel">
            <div class="panel-title">Dữ liệu JSON Gốc (Input)</div>
            <textarea id="jsonInput" placeholder='Dán JSON vào đây...&#10;Ví dụ:&#10;{&#10;  "spacing.section.paddingY.desktop": "96",&#10;  "spacing.section.paddingY.mobile": "56",&#10;  "spacing.slot.gap.desktop": "24",&#10;  "spacing.slot.gap.mobile": "24",&#10;  "cards.featured.padding": "32",&#10;  "cards.product.padding": "32",&#10;  "cards.pricing.padding": "32",&#10;  "cards.cta.padding": "32",&#10;  "cards.media.padding": "32"&#10;}'></textarea>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>Kết Quả Mới (Output)</span>
                <button class="btn-copy" onclick="copyToClipboard()">Sao chép</button>
            </div>
            <textarea id="jsonOutput" readonly placeholder="Kết quả JSON sau khi xử lý sẽ xuất hiện ở đây..."></textarea>
        </div>
    </div>

    <div id="logPanel">
        <div id="logContent"></div>
    </div>

    <div id="comparePanel" class="compare-panel">
        <div id="compareContent"></div>
    </div>
</div>

<script>
    let modifiedCount = 0;
    let logDetails = [];
    const DIVISOR = 4;
    let exactlyJsonCache = null;

    function getSelectedKeys() {
        return new Set(
            Array.from(document.querySelectorAll('.format-option:checked')).map((input) => input.value)
        );
    }

    function transformSpacingValue(val) {
        const parsed = typeof val === 'string' ? Number(val) : val;
        if (typeof parsed !== 'number' || Number.isNaN(parsed)) {
            return null;
        }
        const divided = parsed / DIVISOR;
        return typeof val === 'string' ? String(divided) : divided;
    }

    // Hàm đệ quy duyệt qua Object và biến đổi giá trị, trả về Object mới sạch sẽ
    function transformObject(obj, selectedKeys, path = '') {
        if (typeof obj !== 'object' || obj === null) return obj;

        // Nếu là Array (mảng), xử lý từng phần tử trong Array đó
        if (Array.isArray(obj)) {
            return obj.map((item, index) => transformObject(item, selectedKeys, `${path}[${index}]`));
        }

        let newObj = {};
        for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
                let currentPath = path ? `${path}.${key}` : key;
                let val = obj[key];

                if (selectedKeys.has(key)) {
                    const newVal = transformSpacingValue(val);
                    if (newVal !== null) {
                        newObj[key] = newVal;
                        modifiedCount++;
                        logDetails.push(`<div class="log-item">🔹 Đã đổi: <b>${currentPath}</b> (${val} ➔ <b>${newVal}</b>)</div>`);
                    } else {
                        newObj[key] = val;
                    }
                } else if (typeof val === 'object' && val !== null) {
                    // Nếu là một cụm object con lồng nhau, tiếp tục đào sâu đệ quy
                    newObj[key] = transformObject(val, selectedKeys, currentPath);
                } else {
                    // Các key khác giữ nguyên hoàn toàn dữ liệu ban đầu
                    newObj[key] = val;
                }
            }
        }
        return newObj;
    }

    function flattenObject(obj, path = '', result = {}) {
        if (Array.isArray(obj)) {
            if (obj.length === 0 && path) {
                result[path] = [];
            }
            obj.forEach((item, index) => {
                const nextPath = `${path}[${index}]`;
                flattenObject(item, nextPath, result);
            });
            return result;
        }

        if (typeof obj === 'object' && obj !== null) {
            const keys = Object.keys(obj);
            if (keys.length === 0 && path) {
                result[path] = {};
            }
            keys.forEach((key) => {
                const nextPath = path ? `${path}.${key}` : key;
                flattenObject(obj[key], nextPath, result);
            });
            return result;
        }

        if (path) {
            result[path] = obj;
        }
        return result;
    }

    async function loadExactlyJSON() {
        if (exactlyJsonCache) {
            return exactlyJsonCache;
        }

        const response = await fetch('./exactly.json', { cache: 'no-store' });
        if (!response.ok) {
            throw new Error(`Không đọc được exactly.json (HTTP ${response.status})`);
        }

        exactlyJsonCache = await response.json();
        return exactlyJsonCache;
    }

    function transformJSON() {
        const inputRaw = document.getElementById('jsonInput').value.trim();
        const outputTextArea = document.getElementById('jsonOutput');
        const logPanel = document.getElementById('logPanel');
        const logContent = document.getElementById('logContent');
        const comparePanel = document.getElementById('comparePanel');
        const selectedKeys = getSelectedKeys();

        // Reset bộ đếm và log
        modifiedCount = 0;
        logDetails = [];
        outputTextArea.value = '';
        logPanel.style.display = 'none';
        comparePanel.style.display = 'none';

        if (!inputRaw) {
            alert('Vui lòng nhập hoặc dán chuỗi JSON vào ô bên trái!');
            return;
        }

        if (selectedKeys.size === 0) {
            alert('Vui lòng chọn ít nhất 1 thuộc tính cần format!');
            return;
        }

        try {
            // Parse chuỗi thành Object
            const parsedJson = JSON.parse(inputRaw);

            // Chạy bộ lọc đệ quy
            const transformedJson = transformObject(parsedJson, selectedKeys);

            // Đưa kết quả ra ô bên phải (giữ khoảng cách thụt đầu dòng 2 spaces cho đẹp)
            outputTextArea.value = JSON.stringify(transformedJson, null, 2);

            // In log thông báo số lượng đã đổi
            logPanel.style.display = 'block';
            let successHtml = `<div class="log-success"><b>Thành công!</b> Đã xử lý xong file JSON. Đã tìm thấy và chia cho 4 tại <b>${modifiedCount}</b> vị trí.</div>`;
            if (logDetails.length > 0) {
                successHtml += `<div style="margin-top: 10px; max-height: 150px; overflow-y: auto;">` + logDetails.join('') + `</div>`;
            }
            logContent.innerHTML = successHtml;

        } catch (e) {
            // Báo lỗi nếu cấu trúc chuỗi JSON paste vào bị sai (thiếu dấu ngoặc, phẩy...)
            logPanel.style.display = 'block';
            logContent.innerHTML = `<div class="log-error"><b>Lỗi định dạng JSON:</b> Chuỗi paste vào không hợp lệ.<br>Chi tiết: ${e.message}</div>`;
        }
    }

    async function compareWithExactlyJSON() {
        const outputRaw = document.getElementById('jsonOutput').value.trim();
        const comparePanel = document.getElementById('comparePanel');
        const compareContent = document.getElementById('compareContent');

        comparePanel.style.display = 'none';

        if (!outputRaw) {
            alert('Chưa có JSON mới để so sánh. Hãy chạy "Thực Thi & Chia 4" trước.');
            return;
        }

        try {
            const outputJson = JSON.parse(outputRaw);
            const exactlyJson = await loadExactlyJSON();
            const outputFlat = flattenObject(outputJson);
            const exactlyFlat = flattenObject(exactlyJson);

            const missingEntries = Object.keys(exactlyFlat)
                .filter((key) => !Object.prototype.hasOwnProperty.call(outputFlat, key))
                .sort();

            comparePanel.style.display = 'block';

            if (missingEntries.length === 0) {
                compareContent.innerHTML = `<div class="log-success"><b>So sánh hoàn tất!</b> JSON mới không thiếu key nào so với <b>exactly.json</b>.</div>`;
                return;
            }

            const missingHtml = missingEntries
                .map((key) => `<div class="log-item">• <b>${key}</b>: ${JSON.stringify(exactlyFlat[key])}</div>`)
                .join('');

            compareContent.innerHTML = `
                <div class="log-warning"><b>So sánh hoàn tất!</b> JSON mới đang thiếu <b>${missingEntries.length}</b> key so với <b>exactly.json</b>.</div>
                <div style="margin-top: 10px; max-height: 240px; overflow-y: auto;">${missingHtml}</div>
            `;
        } catch (error) {
            comparePanel.style.display = 'block';
            compareContent.innerHTML = `
                <div class="log-error"><b>Không thể so sánh với exactly.json:</b><br>Chi tiết: ${error.message}<br><br>Gợi ý: hãy mở file qua local server thay vì mở trực tiếp bằng <code>file://</code>.</div>
            `;
        }
    }

    function copyToClipboard() {
        const outputTextArea = document.getElementById('jsonOutput');
        if (!outputTextArea.value) {
            alert('Chưa có kết quả để sao chép!');
            return;
        }
        outputTextArea.select();
        document.execCommand('copy');
        alert('Đã sao chép JSON mới thành công!');
    }
</script>

</body>
</html>
