    function clone(data){
        return JSON.parse(JSON.stringify(data));
    }
    
    function isObject(value){
        return (
            value &&
            typeof value === "object" &&
            !Array.isArray(value)
        );
    }
    
    function deepMerge(target, source){
        const result = clone(target);
        Object.keys(source).forEach(key => {
            const sourceValue = source[key];
            const targetValue = result[key];
    
            if(
                isObject(sourceValue) &&
                isObject(targetValue)
            ){
                result[key] = deepMerge(
                    targetValue,
                    sourceValue
                );
            }else{
                result[key] = clone(sourceValue);
            }
        });
        return result;
    }
    
    function mergeArrayById(
        source,
        target,
        mapping = {},
        keepOriginalName = false // Thêm cờ điều kiện giữ nguyên thuộc tính name ban đầu
    ){
        source = Array.isArray(source) ? source : [];
        target = Array.isArray(target) ? target : [];
    
        const map = new Map();
        source.forEach(item => {
            const id = mapping[item.id] || item.id;
            
            // Khởi tạo object map mới
            const mappedItem = {
                ...item,
                id
            };
            
            // Nếu không giữ name cũ, mặc định sẽ gán name bằng id
            if (!keepOriginalName) {
                mappedItem.name = id;
            }

            map.set(id, mappedItem);
        });
    
        return target.map(item => {
            const sourceItem = map.get(item.id);
            if(!sourceItem){
                return clone(item);
            }
            return deepMerge(item, sourceItem);
        });
    }
    
    function createDarkFromScheme3(
        scheme3,
        darkDefault
    ){
        return {
            ...clone(darkDefault),
            value: {
                ...clone(darkDefault.value),
                ...clone(scheme3.value),
                background: darkDefault.value.background
            }
        };
    }
    
    function convertTheme(v1){
        const result = clone(DEFAULT_V2);
    
        // 1. Convert Colors
        result.colors = mergeArrayById(
            v1.colors,
            result.colors,
            {
                "scheme-1": "light",
                "scheme-2": "muted",
                "scheme-3": "accent",
                "other": "other"
            }
        );
    
        const scheme3 = v1.colors?.find(item => item.id === "scheme-3");
        if(scheme3){
            const darkIndex = result.colors.findIndex(item => item.id === "dark");
            if(darkIndex > -1){
                result.colors[darkIndex] = createDarkFromScheme3(
                    scheme3,
                    result.colors[darkIndex]
                );
            }
        }
    
        // 2. Convert Typography
        result.typography = mergeArrayById(
            v1.typography,
            result.typography,
            {
                "h1": "h1",
                "h2": "h2",
                "h3": "h3",
                "h4": "h4",
                "h5": "h5",
                "p": "p1",
                "eyebrow": "eyebrow"
            }
        );
    
        // 3. Convert Buttons (Truyền tham số true để GIỮ NGUYÊN thuộc tính name từ V1)
        result.buttons = mergeArrayById(
            v1.buttons,
            result.buttons,
            {
                "primary": "primary",
                "secondary": "secondary",
                "tertiary": "tertiary",
                "button": "button"
            },
            true // keepOriginalName = true
        );
    
        // Giới hạn borderRadius tối đa là 50 ở nhóm button
        const globalButtonIndex = result.buttons.findIndex(item => item.id === "button");
        if (globalButtonIndex > -1 && result.buttons[globalButtonIndex].value) {
            let btnVal = result.buttons[globalButtonIndex].value;
            if (typeof btnVal.borderRadius === 'number') {
                btnVal.borderRadius = Math.min(btnVal.borderRadius, 50);
            }
        }
    
        return result;
    }
    
    document
    .getElementById("convertBtn")
    .addEventListener(
        "click",
        () => {
            try{
                const v1 = JSON.parse(
                    document.getElementById("v1").value
                );
    
                const result = convertTheme(v1);
    
                document.getElementById("output").value = JSON.stringify(
                    result,
                    null,
                    2
                );
            }catch(error){
                alert(error.message);
            }
        }
    );
    </script>
